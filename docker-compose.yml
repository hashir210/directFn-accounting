services:
  mysql:
    image: mysql:8.0
    container_name: finflow_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: finflow
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-ppassword"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - finflow_network

  adminer:
    image: adminer:latest
    container_name: finflow_adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - finflow_network

volumes:
  mysql_data:
    name: finflow_mysql_data

networks:
  finflow_network:
    name: finflow_network
